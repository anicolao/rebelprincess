name: Verify and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Install dependencies
        run: nix develop --command bun install --frozen-lockfile
      - name: Install deterministic Chromium
        run: nix develop --command bunx playwright install chromium
      - name: Check application
        run: nix develop --command bun run check
      - name: Run unit tests
        run: nix develop --command bun run test:unit
      - name: Run Firestore Rules tests
        run: nix develop --command bun run test:rules
      - name: Run E2E tracer bullets
        run: nix develop --command bun run test:e2e
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Install dependencies
        run: nix develop --command bun install --frozen-lockfile
      - name: Determine deployment path
        id: deployment
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=/rebelprincess/pr${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "destination=pr${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=/rebelprincess" >> "$GITHUB_OUTPUT"
            echo "destination=" >> "$GITHUB_OUTPUT"
          fi
      - name: Build static client
        run: nix develop --command bun run build
        env:
          PUBLIC_BASE_PATH: ${{ steps.deployment.outputs.base }}
          VITE_GIT_HASH: ${{ github.event.pull_request.head.sha || github.sha }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - name: Deploy retained GitHub Pages content
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build
          destination_dir: ${{ steps.deployment.outputs.destination }}
          keep_files: true
      - name: Comment with PR preview
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const body = `Preview deployed to: https://${context.repo.owner}.github.io/${context.repo.repo}/pr${context.issue.number}/`;
            const comments = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number
            });
            const existing = comments.data.find((comment) =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('Preview deployed to:')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body
              });
            }
